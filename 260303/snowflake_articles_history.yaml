apiVersion: "v3.1.0"
kind: "DataContract"
id: "snowflake_articles_history"
name: "Articles History2"
version: "1.0.0"
status: "active"
description:
  purpose: "All article snapshots since 2020"
  usage: "Max. 10x queries per day"
  limitations: "Not suitable for real-time use cases"
team:
  name: "products"
  members:
    - username: "gordie.stuart@demoTHTvoRKjjhGo8CmVLjE3f.datamesh-manager.com"
      role: "contact"
price:
  priceAmount: "1000"
  priceCurrency: "USD"
  priceUnit: "month"
customProperties:
  - property: "noticePeriod"
    value: "P3M"
servers:
  - server: "snowflake-articles"
    type: "snowflake"
    account: "acme-articles"
    database: "ARTICLES_DB"
    schema: "HISTORY"
schema:
  - name: "articles_history"
    physicalType: "table"
    businessName: "Articles History"
    description: "The history of articles."
    properties:
      - name: "sku"
        logicalType: "string"
        required: true
        authoritativeDefinitions:
          - type: "definition"
            url: "http://localhost:8888/demo250160250327/definitions/fulfillment/sku"
      - name: "name"
        businessName: "Name"
        logicalType: "string"
        description: "The name of the article"
        physicalType: "text"
      - name: "color"
        businessName: "Color"
        logicalType: "string"
        description: "The color of the article"
        physicalType: "text"
      - name: "brand_name"
        businessName: "Brand Name"
        logicalType: "string"
        description: "The brand of the article"
        physicalType: "text"
      - name: "timestamp"
        required: true
        authoritativeDefinitions:
          - type: "definition"
            url: "http://localhost:8888/demo250160250327/definitions/global/actual_timestamp"
      - name: "processing_timestamp"
        required: true
        authoritativeDefinitions:
          - type: "definition"
            url: "http://localhost:8888/demo250160250327/definitions/global/processed_timestamp"
