- property: "keywords"
  value: "orders, purchases, sales, transactions, line items, revenue, PII, customer orders, order history, ecommerce, checkout"
- property: "aiInstructions"
  value: "Always join ORDERS with LINE_ITEMS using ORDER_ID when answering questions about products or line-level details. Use the non-PII output port (snowflake_orders_npii_v2) unless the user explicitly needs email, phone, or address fields. ORDER_TOTAL is in EUR. When filtering by date, use ORDER_DATE (not CREATED_AT). For revenue analysis, sum ORDER_TOTAL from the ORDERS table — do not sum line item prices, as they may not include discounts."
- property: "aiExamples"
  value: |
    Q: What are the top 10 customers by total revenue?
    SELECT CUSTOMER_ID, COUNT(*) AS order_count, SUM(ORDER_TOTAL) AS total_revenue FROM ANALYTICS.ORDERS_V2.ORDERS GROUP BY CUSTOMER_ID ORDER BY total_revenue DESC LIMIT 10;

    Q: How many orders were placed in the last 30 days?
    SELECT COUNT(*) AS order_count FROM ANALYTICS.ORDERS_V2.ORDERS WHERE ORDER_DATE >= DATEADD(day, -30, CURRENT_DATE());

    Q: What is the average number of line items per order?
    SELECT AVG(line_item_count) FROM (SELECT ORDER_ID, COUNT(*) AS line_item_count FROM ANALYTICS.ORDERS_V2.LINE_ITEMS GROUP BY ORDER_ID);
